<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup: The Scriptorium (Mirrored CoinDetail)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Montserrat:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        /* Shared CSS Variables (from style_guide.md) */
        :root {
            --bg-manuscript: #FCF9F2;
            --text-ink: #2D2926;
            --text-muted: #7A7875;
            --border-hairline: #E0DCCD;
            --accent-manuscript: #914E32;
            --stone-pedestal: #F0EDE6;
            --error-red: #B22222;
            
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            --spacing-large: 4rem;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-manuscript);
            color: var(--text-ink);
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 1. App Header (Mirrors CoinDetail) */
        .app-header {
            padding: 1rem var(--spacing-large);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-manuscript);
            border-bottom: 1px solid var(--border-hairline);
            z-index: 10;
        }

        .nav-back {
            background: none; border: none;
            font-family: var(--font-sans); font-size: 0.9rem;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-muted); cursor: pointer;
        }
        .nav-back:hover { color: var(--accent-manuscript); }

        .header-actions { display: flex; gap: 1rem; }

        .btn-minimal {
            background: none; border: none;
            border-bottom: 1px solid var(--text-ink);
            font-family: var(--font-mono); font-size: 0.8rem;
            color: var(--text-ink); cursor: pointer;
            padding-bottom: 2px;
        }

        .btn-solid {
            background: var(--text-ink); color: #fff;
            padding: 0.5rem 1.5rem; border: none;
            font-family: var(--font-mono); font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer;
        }

        /* 2. Ledger Layout (Grid) */
        .ledger-layout {
            display: grid;
            grid-template-columns: 45% 55%;
            height: 100%;
            overflow: hidden;
        }

        /* 3. Left Folio (The Plate / Lens) */
        .left-folio {
            background: var(--stone-pedestal);
            border-right: 1px solid var(--border-hairline);
            padding: var(--spacing-large);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Align top like Detail */
            padding-top: 6rem;
        }

        .plate-frame-edit {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1/1;
            background: #fff;
            border: 1px dashed var(--border-hairline);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .plate-frame-edit:hover {
            border-color: var(--accent-manuscript);
            background: #fffdf9;
        }

        .plate-caption {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* 4. Right Folio (The Record / Form) */
        .right-folio {
            padding: var(--spacing-large);
            overflow-y: auto;
            padding-bottom: 8rem;
        }

        /* Folio Header (Title Block) */
        .folio-header { margin-bottom: 3rem; }
        
        .meta-line {
            display: block;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--accent-manuscript);
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        /* Editable Title (H1) */
        .input-h1 {
            width: 100%;
            border: none;
            border-bottom: 1px solid transparent;
            background: transparent;
            font-family: var(--font-serif);
            font-size: 3rem;
            font-weight: 700;
            color: var(--text-ink);
            line-height: 1.1;
            padding: 0;
            margin-bottom: 0.5rem;
            outline: none;
        }
        .input-h1:focus { border-bottom-color: var(--border-hairline); }
        .input-h1::placeholder { color: #e0dccd; }

        /* Subtitle Inputs */
        .subtitle-grid {
            display: flex; gap: 1rem; align-items: center;
            font-family: var(--font-serif); font-size: 1.2rem; color: var(--text-muted);
            font-style: italic;
        }
        .input-sub {
            border: none; border-bottom: 1px dashed var(--border-hairline);
            background: transparent;
            font-family: inherit; font-size: inherit; color: inherit; font-style: inherit;
            width: 150px; outline: none;
        }
        .input-sub:focus { border-bottom-style: solid; border-bottom-color: var(--accent-manuscript); color: var(--text-ink); }

        /* Metrics Grid (Mirrors CoinDetail) */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 cols like Detail usually handles better */
            gap: 2rem;
            margin: 3rem 0;
            padding: 2rem 0;
            border-top: 1px solid var(--border-hairline);
            border-bottom: 1px solid var(--border-hairline);
        }

        .metric-item { display: flex; flex-direction: column; gap: 0.5rem; }
        
        .metric-label {
            font-family: var(--font-sans);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .input-metric {
            width: 100%;
            border: none; border-bottom: 1px solid var(--border-hairline);
            background: transparent;
            font-family: var(--font-mono); font-size: 1rem; color: var(--text-ink);
            padding-bottom: 4px; outline: none;
        }
        .input-metric:focus { border-bottom-color: var(--accent-manuscript); }

        /* Numismatic Sections */
        .numismatic-section { margin-bottom: 3rem; }
        
        .section-label {
            display: block;
            font-family: var(--font-sans);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-hairline);
            padding-bottom: 0.5rem;
            width: 100px;
        }

        .input-block {
            width: 100%;
            border: 1px solid transparent;
            background: rgba(255,255,255,0.5);
            padding: 0.5rem;
            font-family: var(--font-serif); font-size: 1.1rem;
            resize: vertical; outline: none;
            transition: background 0.2s;
        }
        .input-block:hover { background: #fff; border-color: var(--border-hairline); }
        .input-block:focus { background: #fff; border-color: var(--accent-manuscript); }

        .input-legend {
            font-family: var(--font-sans);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            width: 100%;
            border: none; border-bottom: 1px solid var(--border-hairline);
            background: transparent;
            margin-bottom: 0.5rem;
            outline: none;
        }

        /* Footer */
        .ledger-footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-hairline);
            display: flex; gap: 3rem;
            font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted);
        }
        
        .footer-input {
            border: none; border-bottom: 1px dashed var(--border-hairline);
            background: transparent;
            font-family: inherit; font-size: inherit; color: var(--text-ink);
            width: 120px;
        }

    </style>
</head>
<body>

    <!-- Header (Mirrors CoinDetail) -->
    <header class="app-header">
        <button class="nav-back">← Cancel Entry</button>
        <div class="header-actions">
            <button class="btn-minimal">Save Draft</button>
            <button class="btn-solid">Index to Ledger</button>
        </div>
    </header>

    <div class="ledger-layout">
        
        <!-- Left Folio: The Lens Receiver -->
        <div class="left-folio">
            <div class="plate-frame-edit">
                <div style="font-size: 2rem; color: var(--text-muted);">📷</div>
                <div style="font-family: var(--font-serif); color: var(--text-muted); margin-top:0.5rem;">Use Lens</div>
            </div>
            <div class="plate-caption">PLATE I // OBVERSE // WAITING FOR SIGNAL</div>
            
            <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                <button class="btn-minimal" style="font-size: 0.7rem;">+ Reverse</button>
                <button class="btn-minimal" style="font-size: 0.7rem;">+ Edge</button>
            </div>
        </div>

        <!-- Right Folio: The Record Editor -->
        <div class="right-folio">
           
           <header class="folio-header">
             <span class="meta-line">NEW ENTRY // #1024 // [ERA AUTO-DETECT]</span>
             <input type="text" class="input-h1" placeholder="Object Title" value="Athenian Owl Tetradrachm">
             
             <div class="subtitle-grid">
                Minted at <input type="text" class="input-sub" value="Athens">
                //
                <input type="text" class="input-sub" value="450 BC">
             </div>
           </header>

          <!-- 1. Physical Metrics -->
          <div class="metrics-grid">
            <div class="metric-item">
              <span class="metric-label">Weight (g)</span>
              <input type="text" class="input-metric" value="17.20">
            </div>
            <div class="metric-item">
              <span class="metric-label">Diameter (mm)</span>
              <input type="text" class="input-metric" value="24.5">
            </div>
            <div class="metric-item">
              <span class="metric-label">Die Axis (h)</span>
              <input type="number" class="input-metric" value="9">
            </div>
            <div class="metric-item">
              <span class="metric-label">Material</span>
              <input type="text" class="input-metric" value="Silver (AR)">
            </div>
            <div class="metric-item">
              <span class="metric-label">Fineness</span>
              <input type="text" class="input-metric" placeholder="—">
            </div>
            <div class="metric-item">
              <span class="metric-label">Grade</span>
              <input type="text" class="input-metric" value="Choice XF">
            </div>
          </div>

          <!-- 2. Numismatic Data -->
          <div class="numismatic-section">
             <span class="section-label">Obverse</span>
             <input type="text" class="input-legend" placeholder="LEGEND (LATIN/GREEK)">
             <textarea class="input-block" placeholder="Description of motif...">Head of Athena right, wearing crested Attic helmet decorated with three olive leaves...</textarea>
          </div>

          <div class="numismatic-section">
             <span class="section-label">Reverse</span>
             <input type="text" class="input-legend" value="AOE">
             <textarea class="input-block" placeholder="Description of motif...">Owl standing right, head facing. Olive sprig and crescent in upper left field.</textarea>
          </div>

          <div class="numismatic-section">
             <span class="section-label">References</span>
             <input type="text" class="input-metric" placeholder="e.g. HGC 4, 1597" style="width: 100%;">
          </div>

          <!-- 3. Curator's Note -->
          <div class="numismatic-section">
              <span class="section-label">Curator's Note</span>
              <textarea class="input-block" style="min-height: 150px;">The classic tetradrachm of Athens, representing the height of the city's power in the 5th century BC.</textarea>
          </div>
          
          <div class="numismatic-section">
              <span class="section-label">Provenance</span>
              <input type="text" class="input-metric" value="Ex. BCD Collection" style="width: 100%;">
          </div>

          <!-- 4. Acquisition Footer -->
          <footer class="ledger-footer">
            <div class="footer-item">
              <strong>Acquired:</strong> 
              <input type="date" class="footer-input" value="2024-01-15">
            </div>
            <div class="footer-item">
              <strong>Source:</strong> 
              <input type="text" class="footer-input" value="CNG Auctions">
            </div>
            <div class="footer-item">
                 <strong>Cost:</strong> 
                 <input type="text" class="footer-input" value="1200.00">
            </div>
          </footer>

        </div>
    </div>

</body>
</html>
