<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup: The Scriptorium v5 (The Integrated Desk)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Montserrat:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-manuscript: #FCF9F2;
            --text-ink: #2D2926;
            --text-muted: #7A7875;
            --border-hairline: #E0DCCD;
            --accent-manuscript: #914E32;
            --stone-pedestal: #F0EDE6;
            --error-red: #B22222;
            
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            --spacing-large: 4rem;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-manuscript);
            color: var(--text-ink);
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 1. App Header (Mirrored from CoinDetail) */
        .app-header {
            padding: 1.5rem var(--spacing-large);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-manuscript);
            position: relative;
        }

        /* Thin header line */
        .app-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: var(--spacing-large);
            right: var(--spacing-large);
            height: 1px;
            background: var(--border-hairline);
        }

        .nav-back {
            background: none; border: none;
            font-family: var(--font-sans); font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 2px;
            color: var(--text-muted); cursor: pointer;
        }
        .nav-back:hover { color: var(--accent-manuscript); }

        .header-actions { display: flex; gap: 2rem; align-items: center; }

        .btn-minimal {
            background: none; border: none;
            border-bottom: 1px solid var(--text-ink);
            font-family: var(--font-mono); font-size: 0.75rem;
            color: var(--text-ink); cursor: pointer;
            padding-bottom: 2px;
            text-transform: uppercase;
        }

        .btn-solid {
            background: var(--text-ink); color: #fff;
            padding: 0.6rem 2rem; border: none;
            font-family: var(--font-mono); font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer;
        }

        /* 2. Ledger Layout (v4 Grid & Divider) */
        .ledger-layout {
            display: grid;
            grid-template-columns: 45% 55%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Floating Vertical Divider */
        .ledger-layout::before {
            content: '';
            position: absolute;
            left: 45%;
            top: 4rem;
            bottom: 4rem;
            width: 1px;
            background: var(--border-hairline);
            z-index: 5;
        }

        /* 3. Left Folio (Plate Editor) */
        .left-folio {
            background: var(--bg-manuscript);
            padding: var(--spacing-large);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 6rem;
            padding-right: var(--spacing-large);
        }

        .plate-frame-edit {
            width: 100%;
            max-width: 450px;
            aspect-ratio: 1/1;
            background: var(--stone-pedestal);
            border: 1px dashed var(--border-hairline);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .plate-frame-edit:hover { border-color: var(--accent-manuscript); background: #efebe2; }
        
        .plate-frame-edit::after {
            content: 'No Image Available';
            font-family: var(--font-serif);
            font-style: italic;
            color: var(--text-muted);
            font-size: 1.2rem;
            opacity: 0.6;
        }

        .plate-caption {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 4. Right Folio (Record Editor) */
        .right-folio {
            padding: var(--spacing-large);
            padding-left: var(--spacing-large);
            overflow-y: auto;
            padding-bottom: 12rem;
            background: var(--bg-manuscript);
        }

        /* Folio Header */
        .folio-header { margin-bottom: 2.5rem; }
        
        .meta-line {
            display: block;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--accent-manuscript);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        /* Editable Title (v3 Affordance) */
        .input-h1 {
            width: 100%;
            border: none;
            border-bottom: 1px solid transparent;
            background: transparent;
            font-family: var(--font-serif);
            font-size: 3.5rem;
            font-weight: 600;
            color: var(--text-ink);
            line-height: 1;
            padding: 0;
            margin-bottom: 0.5rem;
            outline: none;
        }
        .input-h1:focus { border-bottom-color: var(--border-hairline); }

        /* Subtitle Inputs (v3 Dashed Style) */
        .subtitle-grid {
            display: flex; gap: 0.5rem; align-items: center;
            font-family: var(--font-serif); font-size: 1.4rem; color: var(--text-muted);
            font-style: italic;
            margin-bottom: 2rem;
        }
        .input-sub {
            border: none; border-bottom: 1px dashed var(--border-hairline);
            background: transparent;
            font-family: inherit; font-size: inherit; color: inherit; font-style: inherit;
            width: auto; max-width: 200px; outline: none;
        }
        .input-sub:focus { border-bottom-style: solid; border-bottom-color: var(--accent-manuscript); color: var(--text-ink); }

        /* Metrics Grid (v4 Thick Top Border) */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 0;
            padding: 2.5rem 0;
            border-top: 2px solid var(--text-ink);
            border-bottom: none;
        }

        .metric-item { display: flex; flex-direction: column; gap: 0.5rem; }
        
        .metric-label {
            font-family: var(--font-sans);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .input-metric {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--border-hairline);
            background: transparent;
            font-family: var(--font-mono); font-size: 1rem; color: var(--accent-manuscript);
            outline: none;
            padding: 0.25rem 0;
        }
        .input-metric:focus { background: var(--stone-pedestal); border-bottom-color: var(--text-ink); }

        /* Numismatic Sections (v4 Sienna Labels) */
        .numismatic-section { margin-bottom: 2.5rem; }
        
        .section-label {
            display: block;
            font-family: var(--font-sans);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-manuscript);
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        /* Text Area (v3 Tinted Block) */
        .input-block {
            width: 100%;
            border: 1px solid transparent;
            background: rgba(240, 237, 230, 0.4);
            padding: 1rem;
            font-family: var(--font-serif); font-size: 1.2rem;
            resize: vertical; outline: none;
            line-height: 1.6;
            transition: all 0.2s;
        }
        .input-block:focus { background: #fff; border-color: var(--border-hairline); }

        .input-legend {
            font-family: var(--font-mono);
            font-weight: 500;
            background: var(--stone-pedestal);
            padding: 0.5rem 0.75rem;
            font-size: 0.8rem;
            letter-spacing: 1px;
            border: none;
            border-bottom: 1px dashed var(--border-hairline);
            margin-bottom: 1.5rem;
            display: inline-block;
            width: auto;
            outline: none;
        }

        /* Acquisition Footer */
        .ledger-footer {
            margin-top: 4rem;
            padding: 2.5rem;
            background-color: var(--stone-pedestal);
            display: flex; gap: 4rem;
            font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted);
        }
        
        .footer-item strong { color: var(--text-ink); margin-right: 0.5rem; }
        .footer-input {
            border: none; border-bottom: 1px dashed var(--border-hairline);
            background: transparent;
            font-family: inherit; font-size: inherit; color: var(--text-ink);
            width: 140px; outline: none;
        }

    </style>
</head>
<body>

    <header class="app-header">
        <button class="nav-back">← Close Ledger Entry</button>
        <div class="header-actions">
            <button class="btn-minimal">Save Draft</button>
            <button class="btn-solid">Index to Ledger</button>
        </div>
    </header>

    <div class="ledger-layout">
        
        <!-- Left Folio -->
        <div class="left-folio">
            <div class="plate-frame-edit" title="Click to establish Lens bridge">
                <!-- Dashboard Placeholder -->
            </div>
            <div class="plate-caption">PLATE I // WAITING FOR SCRIPTORIUM SIGNAL</div>
        </div>

        <!-- Right Folio -->
        <div class="right-folio">
            
            <div class="folio-header">
                <span class="meta-line">ENTRY #001 // ANCIENT // ATHENS</span>
                <input type="text" class="input-h1" placeholder="Athens Tetradrachm" value="Athens Tetradrachm">
                
                <div class="subtitle-grid">
                    Minted at <input type="text" class="input-sub" placeholder="e.g. Athens" value="Athens">
                    // 
                    <input type="text" class="input-sub" placeholder="e.g. 440 BC" value="440 BC">
                    //
                    <input type="text" class="input-sub" placeholder="e.g. HGC 4, 1597" value="HGC 4, 1597">
                </div>
            </div>

            <!-- Technical Metrics -->
            <div class="metrics-grid">
                <div class="metric-item">
                    <span class="metric-label">Weight</span>
                    <input type="text" class="input-metric" value="17.20 g">
                </div>
                <div class="metric-item">
                    <span class="metric-label">Diameter</span>
                    <input type="text" class="input-metric" value="24.5 mm">
                </div>
                <div class="metric-item">
                    <span class="metric-label">Die Axis</span>
                    <input type="text" class="input-metric" value="9h">
                </div>
                <div class="metric-item">
                    <span class="metric-label">Material</span>
                    <input type="text" class="input-metric" value="Silver">
                </div>
                <div class="metric-item">
                    <span class="metric-label">Fineness</span>
                    <input type="text" class="input-metric" value=".999">
                </div>
                <div class="metric-item">
                    <span class="metric-label">Grade</span>
                    <input type="text" class="input-metric" value="Choice XF">
                </div>
            </div>

            <!-- Numismatic Data -->
            <div class="numismatic-section" style="margin-top: 3rem;">
                <span class="section-label">Obverse</span>
                <textarea class="input-block" style="height: 120px;">Head of Athena right, wearing crested Attic helmet decorated with three olive leaves and spiral palmette.</textarea>
            </div>

            <div class="numismatic-section">
                <span class="section-label">Reverse</span>
                <input type="text" class="input-legend" value="AOE">
                <textarea class="input-block" style="height: 120px;">Owl standing right, head facing; olive sprig and crescent to left; all within incuse square.</textarea>
            </div>

            <!-- Curator's Note -->
            <div class="numismatic-section">
                <span class="section-label">Curator's Note</span>
                <textarea class="input-block" style="height: 180px;" placeholder="Record the historical significance..."></textarea>
            </div>

            <!-- Provenance -->
            <div class="numismatic-section">
                <span class="section-label">Provenance</span>
                <input type="text" class="input-metric" style="width: 100%; color: var(--text-ink);" value="Ex. BCD Collection">
            </div>

            <!-- Acquisition Footer -->
            <footer class="ledger-footer">
                <div class="footer-item">
                    <strong>Acquired:</strong> 
                    <input type="text" class="footer-input" value="2024-03-12">
                </div>
                <div class="footer-item">
                    <strong>Source:</strong> 
                    <input type="text" class="footer-input" value="CNG Auctions">
                </div>
                <div class="footer-item">
                    <strong>Cost:</strong> 
                    <input type="text" class="footer-input" value="1,200.00">
                </div>
            </footer>

        </div>
    </div>

</body>
</html>
